<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FIREBASE COMPAT (Sincronización en la Nube) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <!-- LZ-STRING (La Compresión de los Dioses) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

    <style>
        /* --- TEMA ÚNICO: OSCURO PRO --- */
        :root {
            --bg-color: #121212; 
            --surface-color: #1e1e1e; 
            --text-color: #e0e0e0;
            --accent-color: #ff4757; 
            --border-color: #333333; 
            --font-main: 'Segoe UI', system-ui, sans-serif;
            --shadow: rgba(0,0,0,0.5); 
            --toolbar-bg: #2d2d2d; 
            --card-hover: #2a2a2a;
            --success-color: #32ff7e; 
            
            /* Variables del Sidebar */
            --sidebar-width-expanded: 260px;
            --sidebar-width-collapsed: 65px;
        }

        * { box-sizing: border-box; transition: background-color 0.2s, border-color 0.2s; }

        body {
            margin: 0; height: 100vh; background-color: var(--bg-color); color: var(--text-color);
            font-family: var(--font-main); overflow: hidden; display: flex;
        }

        /* --- SKELETON LOADING ANIMATION --- */
        @keyframes skeleton-glow {
            0% { background-color: #2a2a2a; }
            50% { background-color: #3d3d3d; }
            100% { background-color: #2a2a2a; }
        }
        .skeleton {
            animation: skeleton-glow 1.5s ease-in-out infinite;
            border-radius: 4px;
        }
        .skel-text { height: 14px; margin-bottom: 12px; width: 100%; }
        .skel-text.short { width: 60%; }
        .skel-title { height: 22px; width: 80%; margin-bottom: 20px; }
        .skel-card { 
            padding: 20px; border-radius: 12px; 
            border: 1px solid var(--border-color); 
            background-color: var(--surface-color); 
            height: 250px; display: flex; flex-direction: column;
        }
        .skel-footer { margin-top: auto; height: 12px; width: 40%; }
        .skel-sidebar-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-bottom: 1px solid var(--border-color); }
        .skel-icon { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; }

        /* --- BOTONES Y CONTROLES --- */
        button, select, input {
            background-color: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color);
            padding: 4px 10px; border-radius: 6px; outline: none; cursor: pointer; font-family: inherit;
        }
        button:hover { filter: brightness(1.2); }
        .btn-primary { background-color: var(--accent-color); color: #fff; border: none; font-weight: bold; padding: 10px 20px; font-size: 1rem; }
        .btn-small { padding: 4px 8px; font-size: 0.85rem; }

        /* --- BARRA LATERAL (SIDEBAR) --- */
        #sidebar {
            width: var(--sidebar-width-expanded);
            background-color: var(--surface-color);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            transition: width 0.3s ease;
            z-index: 50;
        }
        #sidebar.collapsed { width: var(--sidebar-width-collapsed); }
        
        .sidebar-header {
            padding: 15px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 15px; white-space: nowrap; overflow: hidden;
        }
        .btn-hamburger { background: transparent; border: none; font-size: 1.5rem; color: var(--text-color); padding: 0; display: flex; justify-content: center; width: 30px; }
        .sidebar-title { font-weight: bold; font-size: 1.2rem; }
        
        .storage-section {
            padding: 15px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 15px; overflow: hidden; white-space: nowrap;
        }
        .storage-icon { font-size: 1.5rem; width: 30px; text-align: center; }
        .storage-details { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .storage-meter { width: 100%; height: 6px; background-color: var(--bg-color); border-radius: 3px; overflow: hidden; }
        #storage-bar { width: 0%; height: 100%; background-color: var(--accent-color); transition: width 0.3s; }
        #storage-text { font-size: 0.75rem; color: #aaa; }

        .sidebar-notes-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .sidebar-note-item {
            padding: 12px 15px; display: flex; align-items: center; gap: 15px;
            cursor: pointer; border-bottom: 1px solid var(--border-color); overflow: hidden; white-space: nowrap;
        }
        .sidebar-note-item:hover { background-color: var(--toolbar-bg); }
        .note-icon { width: 30px; text-align: center; font-size: 1.2rem; }
        
        .sidebar-tools {
            padding: 10px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px;
        }
        .btn-side-tool {
            display: flex; align-items: center; gap: 15px; background: transparent; border: 1px solid var(--border-color);
            padding: 10px; color: var(--text-color); font-weight: bold; justify-content: flex-start; overflow: hidden; white-space: nowrap;
        }
        .btn-side-tool:hover { background: var(--toolbar-bg); }

        #sidebar.collapsed .sidebar-title,
        #sidebar.collapsed .storage-details,
        #sidebar.collapsed .tool-label,
        #sidebar.collapsed .sidebar-note-title {
            opacity: 0; pointer-events: none; display: none;
        }
        #sidebar.collapsed .storage-section, #sidebar.collapsed .sidebar-note-item, #sidebar.collapsed .btn-side-tool { justify-content: center; padding-left: 0; padding-right: 0; }

        /* --- CONTENEDOR PRINCIPAL --- */
        #main-container { flex: 1; display: flex; flex-direction: column; position: relative; overflow-y: auto; }

        header {
            background-color: var(--surface-color); padding: 15px 30px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10;
        }
        header h1 { margin: 0; font-size: 1.5rem; }
        .controls-row { display: flex; gap: 15px; align-items: center; }

        /* --- PANTALLA DE INICIO (GRID) --- */
        main { padding: 40px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .note-card {
            background-color: var(--surface-color); border: 1px solid var(--border-color); border-radius: 12px;
            padding: 20px; height: 250px; display: flex; flex-direction: column; cursor: pointer; position: relative; box-shadow: 0 4px 6px var(--shadow);
        }
        .note-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px var(--shadow); background-color: var(--card-hover); }
        .note-card-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-card-preview { font-size: 0.95rem; opacity: 0.7; flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; }
        .note-card-footer { margin-top: 15px; font-size: 0.8rem; opacity: 0.5; }
        
        .btn-delete-card {
            position: absolute; top: 15px; right: 15px; background: rgba(255, 77, 77, 0.2); color: #ff4d4d;
            border: none; border-radius: 50%; width: 30px; height: 30px; opacity: 0; transition: opacity 0.2s;
        }
        .note-card:hover .btn-delete-card { opacity: 1; }

        /* --- MODAL (VENTANA SUPERPUESTA DEL EDITOR) --- */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background-color: var(--bg-color); width: 95%; max-width: 900px; height: 90%;
            border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color); overflow: hidden; transform: translateY(20px); transition: transform 0.3s ease, width 0.3s, max-width 0.3s, height 0.3s;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-content.maximized { width: 100% !important; max-width: 100% !important; height: 100% !important; border-radius: 0 !important; border: none !important; }

        .modal-header {
            padding: 20px 30px; border-bottom: 1px solid var(--border-color); background-color: var(--surface-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .title-input { width: 50%; font-size: 1.8rem; font-weight: bold; background: transparent; border: none; color: var(--text-color); outline: none; }
        .header-controls { display: flex; align-items: center; gap: 15px; }

        .btn-icon-head {
            background: transparent; border: 1px solid var(--border-color); font-size: 1.2rem; color: var(--text-color);
            width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }
        .btn-icon-head:hover { background-color: var(--toolbar-bg); }

        /* --- EDITOR DE BLOQUES --- */
        .modal-body { display: flex; flex: 1; overflow: hidden; }
        .main-editor-area { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .editor-wrapper { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        
        .sections-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 30px; }
        .section-block { background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .section-header { background-color: var(--toolbar-bg); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .sec-title-input { font-size: 1.1rem; font-weight: bold; border: none; background: transparent; color: var(--text-color); flex: 1; }
        .sec-limit-wrapper { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #aaa; margin-right: 15px; }
        .sec-limit-input { width: 60px; text-align: center; }
        .btn-del-sec { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; border-radius: 4px; padding: 4px 8px; font-size: 0.8rem; }

        .section-editor { width: 100%; min-height: 80px; outline: none; line-height: 1.6; font-size: 18px; padding: 15px; cursor: text; color: var(--text-color); }
        .section-editor:empty:before { content: attr(data-placeholder); opacity: 0.4; }
        .section-editor > div, .section-editor > p { margin-bottom: 0.8em; }
        .section-editor u { text-decoration-color: var(--accent-color); text-decoration-thickness: 2px; }
        .section-editor font[face="Consolas"] { font-family: 'Consolas', monospace; background-color: var(--surface-color) !important; padding: 2px 6px; border-radius: 4px; }

        .section-footer { padding: 5px 15px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; font-size: 0.8rem; color: #888; background-color: var(--surface-color); }

        /* SEMÁFORO Y CÓDIGO INVISIBLE */
        .section-editor.goal-reached { color: var(--success-color); }
        .section-editor.goal-reached * { color: var(--success-color); }
        .excess-text, .excess-text * { color: #ff4757 !important; text-decoration: underline wavy #ff4757; }
        span.ghost-text, span.ghost-text * { color: #8a8a8a !important; font-style: italic !important; opacity: 0.8; text-decoration: none !important; }

        .btn-add-section { background: transparent; border: 2px dashed var(--border-color); color: var(--text-color); padding: 15px; width: 100%; max-width: 800px; border-radius: 8px; font-weight: bold; margin: 0 auto; }

        /* --- PANELES SECUNDARIOS (TOOLBAR / VIDEOS) --- */
        .video-panel { width: 320px; background-color: var(--toolbar-bg); border-left: 1px solid var(--border-color); display: none; flex-direction: column; }
        .video-panel.active { display: flex; }
        .video-panel-header { padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: bold; }
        .video-list { flex: 1; overflow-y: auto; padding: 15px; list-style: none; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .video-item { background-color: var(--surface-color); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        .video-add-form { padding: 15px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; background-color: var(--bg-color); }

        .toolbar { display: flex; padding: 4px 16px; background-color: var(--toolbar-bg); border-top: 1px solid var(--border-color); flex-wrap: wrap; align-items: center; }
        .modal-footer { background-color: var(--surface-color); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); }
        .time-badge { background-color: var(--bg-color); padding: 6px 15px; border-radius: 20px; border: 1px solid var(--border-color); font-weight: bold; }
        .time-badge.accent { color: var(--accent-color); }
        .time-badge.selection-badge { border-style: dashed; border-color: var(--accent-color); }

        .mode-lectura .toolbar, .mode-lectura .modal-footer, .mode-lectura .video-panel { display: none !important; }
        .mode-lectura .editor-wrapper, .mode-lectura .section-editor { cursor: default; }
        .mode-lectura .section-header, .mode-lectura .btn-add-section { display: none; }
        .mode-lectura .section-block { border: none; margin-bottom: 15px; background: transparent;}
        .mode-lectura .section-footer { display: none; }
    </style>
</head>

    <script>
        // --- 1. CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBnX__R6A6lQw_KuzZxqHRkzZyj10S_4wU",
            authDomain: "aula-virtual-79e4d.firebaseapp.com",
            databaseURL: "https://aula-virtual-79e4d-default-rtdb.firebaseio.com",
            projectId: "aula-virtual-79e4d",
            storageBucket: "aula-virtual-79e4d.firebasestorage.app",
            messagingSenderId: "384731632952",
            appId: "1:384731632952:web:9b4facff98bc7f6ebf5dcd"
        };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('yt_script_writer_compressed');

        // --- 2. BÓVEDA INDEXED-DB ---
        const DB_NAME = "YTScriptProDB";
        function initDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => e.target.result.createObjectStore("store");
                req.onsuccess = (e) => resolve(e.target.result);
                req.onerror = (e) => reject(e);
            });
        }
        async function setLocalVault(key, val) {
            const db = await initDB();
            const tx = db.transaction("store", "readwrite");
            tx.objectStore("store").put(val, key);
            return new Promise(res => tx.oncomplete = res);
        }
        async function getLocalVault(key) {
            const db = await initDB();
            const tx = db.transaction("store", "readonly");
            const req = tx.objectStore("store").get(key);
            return new Promise(res => req.onsuccess = () => res(req.result));
        }

        // --- REFERENCIAS DEL DOM ---
        const sidebar = document.getElementById('sidebar');
        const sectionsContainer = document.getElementById('sections-container');
        const noteTitle = document.getElementById('note-title');
        const notesGridUI = document.getElementById('notes-grid');
        const sidebarListUI = document.getElementById('sidebar-notes-list');
        const syncStatus = document.getElementById('sync-status');
        const storageText = document.getElementById('storage-text');
        const storageBar = document.getElementById('storage-bar');
        const modal = document.getElementById('editor-modal');
        const modalContent = document.getElementById('modal-content');
        const modeSelect = document.getElementById('mode-select');
        const editorWrapper = document.getElementById('editor-wrapper');
        
        let notes = [];
        let currentNoteId = null;
        let lastActiveEditor = null; // Rastrea qué sección está enfocada
        let currentWPM = parseInt(localStorage.getItem('yt-pro-pace')) || 145;
        let autoSaveTimer;

        // --- 3. INICIALIZACIÓN Y SINCRONIZACIÓN ---
        async function bootApp() {
            document.getElementById('pace-select').value = currentWPM;
            
            const localData = await getLocalVault('compressed_notes');
            if (localData) {
                notes = JSON.parse(LZString.decompressFromUTF16(localData) || '[]');
                verifyTemplate();
                renderAllUIs();
                updateStorageMeter(localData);
            } else {
                verifyTemplate();
            }

            dbRef.on('value', async (snapshot) => {
                const cloudCompressed = snapshot.val();
                if (cloudCompressed) {
                    const cloudJSON = LZString.decompressFromUTF16(cloudCompressed);
                    if (cloudJSON) {
                        notes = JSON.parse(cloudJSON);
                        await setLocalVault('compressed_notes', cloudCompressed);
                        renderAllUIs(); 
                        updateStorageMeter(cloudCompressed);
                        syncStatus.textContent = "☁️ Sincronizado";
                        setTimeout(() => syncStatus.textContent = "", 2000);
                    }
                }
            });
        }
        bootApp();

        function verifyTemplate() {
            if (!notes.some(n => n.title === 'Examen Profesional - Portafolio')) {
                notes.push({ 
                    id: Date.now().toString(), title: 'Examen Profesional - Portafolio', updatedAt: Date.now(), videos: [],
                    sections: [
                        { id: 'sec1', title: 'Introducción y Contexto', content: '', limit: 290 },
                        { id: 'sec2', title: 'Autoevaluación', content: '', limit: 435 },
                        { id: 'sec3', title: 'Elección de Evidencias (Proyectos)', content: '', limit: 580 },
                        { id: 'sec4', title: 'Método de Reflexión (Gibbs)', content: '', limit: 580 },
                        { id: 'sec5', title: 'Aprendizajes y Compromisos', content: '', limit: 290 }
                    ]
                });
                triggerMasterSave();
            }
        }

        // --- 4. MOTOR DE GUARDADO ---
        async function triggerMasterSave(immediate = false) {
            syncStatus.textContent = "⚙️ Comprimiendo...";
            clearTimeout(autoSaveTimer);
            
            const saveFunc = async () => {
                if (currentNoteId) {
                    const note = notes.find(n => n.id === currentNoteId);
                    if (note) {
                        note.title = noteTitle.value;
                        note.updatedAt = Date.now();
                        note.sections = [];
                        document.querySelectorAll('.section-block').forEach(block => {
                            note.sections.push({
                                id: block.getAttribute('data-sec-id'),
                                title: block.querySelector('.sec-title-input').value,
                                content: block.querySelector('.section-editor').innerHTML,
                                limit: parseInt(block.querySelector('.sec-limit-input').value) || 0
                            });
                            updateSectionFormatting(block.querySelector('.section-editor'));
                        });
                        updateGlobalStats();
                    }
                }
                
                const jsonString = JSON.stringify(notes);
                const compressedString = LZString.compressToUTF16(jsonString);
                
                await setLocalVault('compressed_notes', compressedString);
                updateStorageMeter(compressedString);
                renderSidebarList(); 
                
                syncStatus.textContent = "☁️ Subiendo...";
                dbRef.set(compressedString)
                    .then(() => { syncStatus.textContent = "☁️ Sincronizado"; setTimeout(() => syncStatus.textContent = "", 2000); })
                    .catch(() => { syncStatus.textContent = "🔌 Guardado Offline"; });
            };
            
            if (immediate) saveFunc();
            else autoSaveTimer = setTimeout(saveFunc, 800);
        }

        function updateStorageMeter(compressedData) {
            const bytes = compressedData.length * 2;
            const kb = (bytes / 1024).toFixed(2);
            const MAX_KB = 51200; 
            const percentage = Math.min((bytes / 1024 / MAX_KB) * 100, 100);
            document.getElementById('storage-text').textContent = `${kb} KB / 50 MB`;
            document.getElementById('storage-bar').style.width = `${percentage}%`;
        }

        // --- INTERFAZ UI ---
        document.getElementById('btn-hamburger').addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        function renderAllUIs() {
            renderNotesGrid();
            renderSidebarList();
        }

        function renderSidebarList() {
            sidebarListUI.innerHTML = '';
            const sortedNotes = [...notes].sort((a, b) => b.updatedAt - a.updatedAt);
            sortedNotes.forEach(note => {
                const li = document.createElement('li');
                li.className = 'sidebar-note-item';
                li.onclick = () => openNoteModal(note.id);
                li.innerHTML = `<div class="note-icon">📝</div><div class="sidebar-note-title">${note.title || 'Sin Título'}</div>`;
                sidebarListUI.appendChild(li);
            });
        }

        function renderNotesGrid() {
            notesGridUI.innerHTML = '';
            const sortedNotes = [...notes].sort((a, b) => b.updatedAt - a.updatedAt);
            sortedNotes.forEach(note => {
                let previewText = '';
                if(note.sections && note.sections.length > 0) {
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = note.sections[0].content;
                    previewText = tempDiv.innerText || 'Sin contenido...';
                }
                const dateObj = new Date(note.updatedAt);
                const dateString = dateObj.toLocaleDateString('es-MX', { timeZone: 'America/Monterrey' }) + ' ' + dateObj.toLocaleTimeString('es-MX', { timeZone: 'America/Monterrey', hour:'2-digit', minute:'2-digit' });

                const card = document.createElement('div');
                card.className = 'note-card';
                card.onclick = () => openNoteModal(note.id);
                card.innerHTML = `
                    <button class="btn-delete-card" onclick="deleteNote('${note.id}', event)">✕</button>
                    <div class="note-card-title">${note.title || 'Guion sin título'}</div>
                    <div class="note-card-preview">${previewText}</div>
                    <div class="note-card-footer"><span>Editado: ${dateString}</span></div>
                `;
                notesGridUI.appendChild(card);
            });
        }

        function deleteNote(id, event) {
            event.stopPropagation();
            if (confirm('¿Eliminar permanentemente?')) {
                notes = notes.filter(n => n.id !== id);
                triggerMasterSave(true);
                renderAllUIs();
            }
        }

        function openNoteModal(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                currentNoteId = id;
                noteTitle.value = note.title;
                if (!note.sections) note.sections = [{ id: 's1', title: 'Guion Principal', content: note.content || '', limit: 0 }];
                if (!note.videos) note.videos = [];
                
                document.getElementById('mode-select').value = 'editor';
                modalContent.classList.remove('mode-lectura');
                
                renderSectionsUI(note.sections);
                renderVideoList();
                
                modal.classList.add('active');
                
                const savedSize = localStorage.getItem('yt-pro-fontsize') || '18px';
                document.getElementById('font-size').value = savedSize;
                document.querySelectorAll('.section-editor').forEach(ed => {
                    ed.style.fontSize = savedSize;
                    updateSectionFormatting(ed);
                });
                updateGlobalStats();
            }
        }

        document.getElementById('btn-close-modal').addEventListener('click', () => {
            triggerMasterSave(true);
            modal.classList.remove('active');
            renderAllUIs();
        });

        // --- SISTEMA DE SECCIONES CORREGIDO ---
        function renderSectionsUI(sections) {
            sectionsContainer.innerHTML = '';
            sections.forEach(sec => {
                const block = document.createElement('div');
                block.className = 'section-block';
                block.setAttribute('data-sec-id', sec.id);
                block.innerHTML = `
                    <div class="section-header">
                        <input type="text" class="sec-title-input" value="${sec.title}">
                        <div class="sec-limit-wrapper"><label>Límite:</label><input type="number" class="sec-limit-input" value="${sec.limit || 0}" min="0"></div>
                        <button class="btn-del-sec" onclick="deleteSection('${sec.id}')">✕</button>
                    </div>
                    <div class="section-editor" contenteditable="true" data-placeholder="Contenido...">${sec.content}</div>
                    <div class="section-footer"><span class="sec-word-count">0 / ${sec.limit || '∞'} palabras</span></div>
                `;
                sectionsContainer.appendChild(block);
                
                const ed = block.querySelector('.section-editor');
                
                // Rastreo de foco para herramientas de formato
                ed.addEventListener('focus', () => lastActiveEditor = ed);
                
                ed.addEventListener('input', () => triggerMasterSave());
                block.querySelector('.sec-title-input').addEventListener('input', () => triggerMasterSave());
                block.querySelector('.sec-limit-input').addEventListener('input', () => triggerMasterSave(true));
                ed.addEventListener('paste', handlePaste);

                // --- RESTAURACIÓN DE ATAJOS DE TECLADO ---
                ed.addEventListener('keydown', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        const key = e.key.toLowerCase();
                        if (key === 'b') { e.preventDefault(); format('bold'); }
                        if (key === 'i') { e.preventDefault(); format('italic'); }
                        if (key === 'u') { e.preventDefault(); format('underline'); }
                    }
                    if (e.key === 'Enter') {
                        const formatNode = document.queryCommandValue('formatBlock');
                        if (formatNode === 'h1' || formatNode === 'h2' || formatNode === 'h3') {
                            setTimeout(() => format('formatBlock', 'div'), 10);
                        }
                    }
                });
            });
        }

        document.getElementById('btn-add-section').addEventListener('click', () => {
            const note = notes.find(n => n.id === currentNoteId);
            if(note) {
                note.sections.push({ id: 's' + Date.now(), title: 'Nueva Sección', content: '', limit: 0 });
                renderSectionsUI(note.sections);
                triggerMasterSave(true);
            }
        });

        function deleteSection(secId) {
            if(confirm('¿Borrar sección?')) {
                const note = notes.find(n => n.id === currentNoteId);
                note.sections = note.sections.filter(s => s.id !== secId);
                renderSectionsUI(note.sections);
                triggerMasterSave(true);
            }
        }

        // --- DETECCIÓN INTELIGENTE DE CURSOR (RESTURADO Y ADAPTADO) ---
        editorWrapper.addEventListener('mousedown', function(e) {
            if (modeSelect.value === 'editor' && e.target === editorWrapper) {
                e.preventDefault();

                let range = null;
                if (document.caretRangeFromPoint) { 
                    range = document.caretRangeFromPoint(e.clientX, e.clientY);
                } else if (document.caretPositionFromPoint) { 
                    const pos = document.caretPositionFromPoint(e.clientX, e.clientY);
                    if (pos) {
                        range = document.createRange();
                        range.setStart(pos.offsetNode, pos.offset);
                        range.collapse(true);
                    }
                }

                const sel = window.getSelection();
                if (range) {
                    let node = range.startContainer;
                    let isInsideEditor = false;
                    
                    // Buscar a qué sección pertenece el renglón clickeado
                    while (node && node !== document.body) {
                        if (node.classList && node.classList.contains('section-editor')) {
                            isInsideEditor = true;
                            lastActiveEditor = node;
                            node.focus();
                            break;
                        }
                        node = node.parentNode;
                    }

                    if (isInsideEditor) {
                        sel.removeAllRanges();
                        sel.addRange(range);
                    } else {
                        focusLastAvailableEditor(sel);
                    }
                } else {
                    focusLastAvailableEditor(sel);
                }
            }
        });

        function focusLastAvailableEditor(sel) {
            const editors = document.querySelectorAll('.section-editor');
            if (editors.length > 0) {
                const lastEd = editors[editors.length - 1];
                lastActiveEditor = lastEd;
                lastEd.focus();
                
                const fallbackRange = document.createRange();
                fallbackRange.selectNodeContents(lastEd);
                fallbackRange.collapse(false);
                sel.removeAllRanges();
                sel.addRange(fallbackRange);
            }
        }

        // Semáforo Lógico
        function updateSectionFormatting(editorEl) {
            const block = editorEl.closest('.section-block');
            const limit = parseInt(block.querySelector('.sec-limit-input').value) || 0;
            
            saveCaret(editorEl);
            editorEl.querySelectorAll('.excess-text, .ghost-text').forEach(span => {
                const frag = document.createDocumentFragment();
                while(span.firstChild) frag.appendChild(span.firstChild);
                span.parentNode.replaceChild(frag, span);
            });
            editorEl.normalize();

            let html = editorEl.innerHTML;
            const newHtml = html.replace(/(<[^>]+>)|(\[[\s\S]*?\]|===)/g, (match, tag, special) => tag ? tag : `<span class="ghost-text">${special}</span>`);
            if (html !== newHtml) editorEl.innerHTML = newHtml;

            let wordCount = 0; let limitReached = false;
            const walker = document.createTreeWalker(editorEl, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = []; let node;
            while(node = walker.nextNode()) textNodes.push(node);

            for (let i = 0; i < textNodes.length; i++) {
                const textNode = textNodes[i];
                if (textNode.parentNode && textNode.parentNode.classList.contains('ghost-text')) continue;

                if (limit > 0 && limitReached) { wrapNode(textNode, 'excess-text'); continue; }

                const text = textNode.nodeValue;
                const words = text.match(/\S+/g) || [];
                
                if (limit > 0 && (wordCount + words.length > limit)) {
                    limitReached = true;
                    const wordsNeeded = limit - wordCount;
                    let match; let wordRegex = /\S+/g; let currentMatch = 0; let splitIndex = text.length;
                    while ((match = wordRegex.exec(text)) !== null) {
                        currentMatch++;
                        if (currentMatch === wordsNeeded + 1) { splitIndex = match.index; break; }
                    }
                    const validText = text.substring(0, splitIndex);
                    const excessText = text.substring(splitIndex);
                    textNode.nodeValue = validText;
                    if (excessText.length > 0) {
                        const excessNode = document.createTextNode(excessText);
                        const span = document.createElement('span'); span.className = 'excess-text'; span.appendChild(excessNode);
                        textNode.parentNode.insertBefore(span, textNode.nextSibling);
                    }
                    wordCount += wordsNeeded;
                } else { wordCount += words.length; }
            }

            block.querySelector('.sec-word-count').textContent = `${wordCount} / ${limit > 0 ? limit : '∞'} palabras`;
            if (limit > 0 && wordCount >= (limit * 0.9)) editorEl.classList.add('goal-reached');
            else editorEl.classList.remove('goal-reached');

            restoreCaret(editorEl);
        }

        function wrapNode(textNode, className) {
            const span = document.createElement('span'); span.className = className;
            textNode.parentNode.insertBefore(span, textNode); span.appendChild(textNode);
        }

        function saveCaret(editor) {
            const sel = window.getSelection();
            if (sel.rangeCount > 0 && editor.contains(sel.focusNode)) {
                const range = sel.getRangeAt(0);
                const s = document.createElement('span'); s.id = 'caret-start';
                const e = document.createElement('span'); e.id = 'caret-end';
                const rEnd = range.cloneRange(); rEnd.collapse(false); rEnd.insertNode(e);
                const rStart = range.cloneRange(); rStart.collapse(true); rStart.insertNode(s);
            }
        }
        function restoreCaret(editor) {
            const s = editor.querySelector('#caret-start'), e = editor.querySelector('#caret-end');
            if (s && e) {
                const sel = window.getSelection(); const range = document.createRange();
                range.setStartAfter(s); range.setEndBefore(e); sel.removeAllRanges(); sel.addRange(range);
                s.remove(); e.remove();
            } else { if(s) s.remove(); if(e) e.remove(); }
        }

        function updateGlobalStats() {
            let tW = 0, eS = 0;
            document.querySelectorAll('.section-editor').forEach(ed => {
                const textToCount = ed.innerText.trim().replace(/\[[\s\S]*?\]/g, '');
                eS += (textToCount.match(/===/g) ? textToCount.match(/===/g).length : 0) * 5;
                const wordsMatch = textToCount.replace(/===/g, '').match(/\S+/g);
                tW += wordsMatch ? wordsMatch.length : 0;
            });

            document.getElementById('word-count').textContent = `${tW} palabras en total`;
            const scriptSeconds = Math.floor((tW / currentWPM) * 60) + eS;
            document.getElementById('script-time').textContent = `Lectura: ${String(Math.floor(scriptSeconds/60)).padStart(2,'0')}:${String(scriptSeconds%60).padStart(2,'0')}`;

            let clipsSecs = 0;
            const note = notes.find(n => n.id === currentNoteId);
            if (note && note.videos) clipsSecs = note.videos.reduce((tot, v) => tot + v.durationSecs, 0);
            document.getElementById('clips-time').textContent = `Clips: ${String(Math.floor(clipsSecs/60)).padStart(2,'0')}:${String(clipsSecs%60).padStart(2,'0')}`;

            const total = scriptSeconds + clipsSecs;
            document.getElementById('total-time').textContent = `Total: ${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
        }

        // --- VIDEOS Y RESTO DE BOTONES ---
        document.getElementById('btn-add-video').addEventListener('click', () => {
            const n = document.getElementById('vid-name').value.trim() || 'Clip';
            const m = parseInt(document.getElementById('vid-min').value) || 0;
            const s = parseInt(document.getElementById('vid-sec').value) || 0;
            if (m===0 && s===0) return; 
            const note = notes.find(n => n.id === currentNoteId);
            if(note) { note.videos.push({ id: Date.now().toString(), name: n, durationSecs: (m*60)+s }); triggerMasterSave(true); renderVideoList(); updateGlobalStats(); }
        });

        function renderVideoList() {
            const ul = document.getElementById('video-list'); ul.innerHTML = '';
            const note = notes.find(n => n.id === currentNoteId);
            if (!note || !note.videos || note.videos.length === 0) return;
            note.videos.forEach(v => {
                const li = document.createElement('li'); li.className = 'video-item';
                li.innerHTML = `<div><b>${v.name}</b> <span style="color:var(--accent-color);font-size:0.8em">⏱ ${String(Math.floor(v.durationSecs/60)).padStart(2,'0')}:${String(v.durationSecs%60).padStart(2,'0')}</span></div><button class="video-del" onclick="deleteVideoObj('${v.id}')">✕</button>`;
                ul.appendChild(li);
            });
        }

        document.getElementById('btn-maximize').addEventListener('click', () => {
            modalContent.classList.toggle('maximized');
            document.getElementById('btn-maximize').textContent = modalContent.classList.contains('maximized') ? '🗗' : '🗖';
        });
        document.getElementById('btn-toggle-video').addEventListener('click', () => document.getElementById('video-panel').classList.toggle('active'));
        document.getElementById('btn-new-note').addEventListener('click', () => createNewNote(true));
        
        // --- FORMATO CORREGIDO ---
        function format(command, val=null) { 
            document.execCommand(command, false, val); 
            if (lastActiveEditor) lastActiveEditor.focus();
            triggerMasterSave(); 
        }
        
        function handlePaste(e) { e.preventDefault(); document.execCommand('insertText', false, (e.originalEvent||e).clipboardData.getData('text/plain')); }
        
        // --- BACKUP MANUAL ---
        document.getElementById('btn-export-side').addEventListener('click', () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({notes, pace: currentWPM}, null, 2));
            const a = document.createElement('a'); a.href = dataStr; a.download = `YT_ScriptPro_Full_Backup.json`; document.body.appendChild(a); a.click(); a.remove();
        });
        document.getElementById('btn-import-side').addEventListener('click', () => document.getElementById('import-file').click());

        document.getElementById('font-size').addEventListener('change', (e) => {
            const newSize = e.target.value;
            document.querySelectorAll('.section-editor').forEach(ed => ed.style.fontSize = newSize);
            localStorage.setItem('yt-pro-fontsize', newSize);
        });
        
        document.getElementById('pace-select').addEventListener('change', (e) => {
            currentWPM = parseInt(e.target.value);
            localStorage.setItem('yt-pro-pace', currentWPM);
            updateGlobalStats();
        });
    </script>
</body>
